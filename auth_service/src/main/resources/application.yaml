server:
  port: 8082

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:auth_service/.env[.properties]
  application:
    name: auth_service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql

jwt:
  secret-key: ${JWT_SECRET_KEY}
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}
  expiration-ms: ${JWT_EXPIRATION_MS}

refresh-token:
  cookie-name: refreshToken
  expiration-ms: ${REFRESH_TOKEN_EXPIRATION_MS:2592000000}
  cookie-secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}

github:
  app-id: ${GITHUB_APP_ID}
  client-id: ${GITHUB_CLIENT_ID}
  client-secret: ${GITHUB_CLIENT_SECRET}
  private-key-path: ${GITHUB_PRIVATE_KEY_PATH}
  webhook-secret: ${GITHUB_WEBHOOK_SECRET}
  redirect-uri: ${GITHUB_REDIRECT_URI}