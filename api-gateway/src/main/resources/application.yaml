server:
  port: 8081

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: Auth
          uri: http://localhost:8082
          predicates:
            - Path=/auth/**
          filters:
            - AuthFilter

jwt:
  secret-key: ${JWT_SECRET_KEY}
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}
